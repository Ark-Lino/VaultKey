<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>VaultKey</title>
</head>
<body>
  <div class="app">
    <div class="update-banner" id="update-banner" style="display:none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="update-text">New version available</span>
      <a href="#" id="update-link" class="update-link">Update</a>
    </div>
    <header class="header">
      <div class="header-left">
        <svg class="logo" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="4" width="20" height="16" rx="3" stroke="currentColor" stroke-width="2"/>
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          <path d="M12 9V6M12 18V15M9 12H6M18 12H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <h1 class="title">VaultKey</h1>
        <span class="badge badge-offline">Offline</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="select-toggle" title="Select accounts" style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        </button>
        <button class="icon-btn" id="theme-toggle" title="Toggle theme">
          <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="icon-btn" id="settings-btn" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </header>

    <div class="search-bar">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search accounts..." autocomplete="off">
    </div>

    <div class="accounts-list" id="accounts-list">
      <div class="empty-state" id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3">
          <rect x="2" y="4" width="20" height="16" rx="3"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <p>No accounts yet</p>
        <p class="empty-hint">Tap + to add your first TOTP account</p>
      </div>
    </div>

    <div class="delete-bar" id="delete-bar">
      <span class="delete-count" id="delete-count">0 selected</span>
      <button class="btn btn-delete" id="btn-delete-selected">Delete</button>
    </div>

    <button class="fab" id="fab-add" title="Add account">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Bottom Sheet -->
  <div class="overlay" id="overlay"></div>
  <div class="bottom-sheet" id="bottom-sheet">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-content">
      <button class="sheet-option" id="option-enter">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        <span>Enter Key</span>
      </button>
      <button class="sheet-option" id="option-import">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Import Migration</span>
      </button>
    </div>
  </div>

  <!-- Account Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="account-modal">
      <div class="modal-header">
        <h2 id="modal-title">Enter Setup Key</h2>
        <button class="icon-btn modal-close" id="modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="account-form">
        <div class="form-group">
          <label for="acc-name">Name</label>
          <input type="text" id="acc-name" placeholder="e.g. john@example.com" required>
        </div>
        <div class="form-group">
          <label for="acc-issuer">Issuer</label>
          <input type="text" id="acc-issuer" placeholder="e.g. GitHub">
        </div>
        <div class="form-group">
          <label for="acc-secret">Secret (Base32)</label>
          <input type="text" id="acc-secret" placeholder="JBSWY3DPEHPK3PXP" required autocomplete="off" spellcheck="false">
          <span class="secret-status" id="secret-status"></span>
        </div>
        <div class="form-row">
          <div class="form-group form-half">
            <label for="acc-digits">Digits</label>
            <select id="acc-digits">
              <option value="6">6</option>
              <option value="8">8</option>
            </select>
          </div>
          <div class="form-group form-half">
            <label for="acc-period">Period (sec)</label>
            <select id="acc-period">
              <option value="30">30</option>
              <option value="60">60</option>
            </select>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-delete" id="btn-delete" style="display:none;">Delete</button>
          <div class="modal-actions-right">
            <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- QR Modal -->
  <div class="modal-overlay" id="qr-modal-overlay">
    <div class="modal modal-qr" id="qr-modal">
      <div class="modal-header">
        <h2>QR Code</h2>
        <button class="icon-btn modal-close" id="qr-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="qr-content">
        <canvas id="qr-canvas"></canvas>
        <p class="qr-label" id="qr-label"></p>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-overlay" id="import-modal-overlay">
    <div class="modal" id="import-modal">
      <div class="modal-header">
        <h2>Import Migration Link</h2>
        <button class="icon-btn modal-close" id="import-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-group">
        <label for="import-link">Paste migration link</label>
        <textarea id="import-link" rows="3" placeholder="otpauth-migration://offline?data=..."></textarea>
      </div>
      <div id="import-preview" style="display:none;">
        <p class="preview-label">Preview — accounts found:</p>
        <div id="import-preview-list"></div>
      </div>
      <div class="modal-actions">
        <div class="modal-actions-right">
          <button type="button" class="btn btn-secondary" id="import-cancel">Cancel</button>
          <button type="button" class="btn btn-primary" id="import-decode">Decode</button>
          <button type="button" class="btn btn-primary" id="import-confirm" style="display:none;">Import to Extension</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../lib/qrcode-generator.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
